<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #f5f0eb;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 24px;
  }
  .card {
    background: #ffffff;
    width: 100%;
    max-width: 400px;
    border-radius: 24px;
    padding: 44px 36px 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.10);
    animation: fadeUp 0.6s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .logo img { height: 52px; width: auto; display: block; margin-bottom: 36px; }
  .divider { width: 40px; height: 3px; background: #E87C1E; border-radius: 2px; margin-bottom: 28px; }
  .name { font-size: 34px; font-weight: 900; color: #1a1a1a; letter-spacing: 6px; margin-bottom: 8px; }
  .title { font-size: 14px; color: #888; font-weight: 300; letter-spacing: 1px; margin-bottom: 36px; }
  .info-block { display: flex; flex-direction: column; gap: 10px; margin-bottom: 36px; }
  .info-row { display: flex; align-items: center; gap: 10px; font-size: 14px; color: #444; }
  .info-row .icon { width: 20px; font-size: 16px; flex-shrink: 0; }
  .buttons { display: flex; flex-direction: column; gap: 12px; }
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 16px; border-radius: 14px;
    font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700;
    text-decoration: none; cursor: pointer; border: none;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn:active { transform: scale(0.97); }
  .btn-store { background: #03C75A; color: #fff; box-shadow: 0 6px 20px rgba(3,199,90,0.30); }
  .btn-store:hover { box-shadow: 0 8px 28px rgba(3,199,90,0.40); }
  .btn-call { background: #1a1a1a; color: #fff; box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
  .btn-call:hover { box-shadow: 0 8px 28px rgba(0,0,0,0.22); }
  .btn svg { width: 20px; height: 20px; flex-shrink: 0; }
</style>
